<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 04</title>
</head>
<style>
    body {
        font-family: Arial, Helvetica, sans-serif;
    }
    table {
       border-collapse: collapse;
        
    }
    thead {
       border: 1px solid black;
       background-color: lightgray;
    }
    th, td{
        width: 100px;
        border: 1px solid black;
        padding: 10px;
        text-align: center;
    }
</style>
<body>
    <h1>Desafio 03(Parte 02)</h1>
    <table>
        <thead>
            <th>Área</th>
            <th>Disciplinas</th>
            <th>Notas</th>
            <th>Média</th>
        </thead>
        <tbody>
             <tr>
                <th scope="col" rowspan="4">Exatas</th>
                <td>Matemática</td>
                <td>Fisica</td>
                <td>Quimica</td>
                <td>Biologia</td>
             </tr>
             <tr>
                <th colspan="4">Médias de exatas</th>
                <td>0.0</td>
            </tr>
             
             <tr>
                <th rowspan="2">Humanas</th>
                <td>História</td>
                <td>Geografia</td>
             </tr>
             <tr>
                <td>Média de Humanas</td>
                <td>0.0</td>
             </tr>
        </tbody>
        
    </table>

</html>
